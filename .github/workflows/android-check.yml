name: Android Build Check

# Compiles an UNSIGNED debug APK to verify the Android toolchain builds.
# No secrets required. Use this to validate the project before doing a
# real signed release build.
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" "build-tools;35.0.0"
      - run: npm ci
      - run: npm run build
      - run: npx cap sync android
      - name: Assemble debug APK
        run: |
          cd android
          chmod +x gradlew
          set +e
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log
          code=${PIPESTATUS[0]}
          if [ $code -ne 0 ]; then
            msg=$(grep -nE "FAILURE:|What went wrong|Caused by|error:|not been accepted|not found|Could not|No such|Unsupported|requires|^> " /tmp/gradle.log | tail -60 | sed 's/%/%25/g; s/\r//g')
            msg="${msg//$'\n'/%0A}"
            echo "::error::GRADLE FAILED%0A${msg}"
          fi
          exit $code
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

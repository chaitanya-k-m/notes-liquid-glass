name: Android Build Check

# Compiles an UNSIGNED debug APK to verify the Android toolchain builds.
# No secrets required. Use this to validate the project before doing a
# real signed release build.
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" "build-tools;35.0.0"
      - run: npm ci
      - name: Build (web + sync + gradle)
        run: |
          set +e
          (
            set -e
            echo "::group::npm run build"; npm run build; echo "::endgroup::"
            echo "::group::cap sync";       npx cap sync android; echo "::endgroup::"
            echo "::group::gradle";         (cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace); echo "::endgroup::"
          ) 2>&1 | tee /tmp/build.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            msg=$(tail -60 /tmp/build.log | sed 's/%/%25/g; s/\r//g')
            msg="${msg//$'\n'/%0A}"
            echo "::error::BUILD FAILED (exit $code)%0A${msg}"
          fi
          exit $code
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
